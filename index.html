<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement MAFIRIDE</title>

<style>
body{
  font-family:Arial;
  background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("background.jpg") no-repeat center;
  background-size:cover;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:350px;
  text-align:center;
}

.logo{ width:120px; margin-bottom:10px; }

select,input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
}

button{
  background:#00bcd4;
  color:white;
  border:none;
  font-weight:bold;
}
</style>

<script src="https://leekpay.fr/js/leekpay.js"></script>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h3>Paiement commande alimentaire</h3>

<!-- 🌍 PAYS -->
<select id="country" onchange="updateAll()">
  <option value="BEN">Bénin</option>
  <option value="CIV">Côte d'Ivoire</option>
  <option value="CMR">Cameroun</option>
  <option value="COD">RDC</option>
  <option value="GAB">Gabon</option>
  <option value="SEN">Sénégal</option>
</select>

<!-- 📡 OPERATEUR -->
<select id="operator"></select>

<!-- 📞 TELEPHONE -->
<input id="phone">

<!-- 💰 MONTANT -->
<input id="amount" type="number" placeholder="Montant USD">

<p id="result"></p>

<button onclick="payer()">Payer</button>

</div>

<script>

// 🌍 CONFIG
const data = {
  BEN:{prefix:"229",currency:"XOF",operators:["MTN","MOOV"]},
  CIV:{prefix:"225",currency:"XOF",operators:["MTN","ORANGE"]},
  CMR:{prefix:"237",currency:"XAF",operators:["MTN"]},
  COD:{prefix:"243",currency:"CDF",operators:["AIRTEL","ORANGE","VODACOM"]},
  GAB:{prefix:"241",currency:"XAF",operators:["AIRTEL"]},
  SEN:{prefix:"221",currency:"XOF",operators:["ORANGE","FREE"]}
};

const rate = 600;

// 🔄 UPDATE
function updateAll(){

  const c = country.value;

  // opérateurs
  operator.innerHTML="";
  data[c].operators.forEach(o=>{
    let op=document.createElement("option");
    op.textContent=o;
    operator.appendChild(op);
  });

  // prefix
  phone.value = data[c].prefix;
}

updateAll();

// 💳 PAIEMENT
function payer(){

  let usd = parseFloat(amount.value);

  if(!usd){
    alert("Entrer un montant");
    return;
  }

  let local = Math.round(usd * rate);

  result.innerText = "Montant: " + local + " " + data[country.value].currency;

  LeekPay.checkout({
    amount: local,
    currency: data[country.value].currency,
    apiKey: "pk_live_OIf3UkphEVWIVAJdd7VB6KWEm7IBuDwK"
  });

}

</script>

</body>
</html>
